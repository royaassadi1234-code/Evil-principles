<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Digital Critical Edition</title>

<style>
body {
  font-family: Georgia, serif;
  background: #f8f9fb;
  margin: 0;
  padding: 0;
}

/* PAGE LAYOUT */
.page {
  display: flex; /* all content aligned left */
  max-width: 900px; /* narrower, left-aligned */
  margin: auto;
  padding: 20px 10px;
  flex-direction: column; /* stack vertically */
}

/* LEFT SIDE */
.text-area {
  display: flex;
  flex-direction: column;
  gap: 8px;
}

/* DIVISION TITLE */
.division-title {
  font-size: 18px;
  font-weight: bold;
  margin-bottom: 5px;
}

/* TRANSCRIPTION BLOCK */
.transcription-block {
  position: relative;
  margin-bottom: 5px;
  padding-left: 50px; /* space for left compare button */
}

/* COMPARE BUTTON LEFT */
.compare-btn {
  position: absolute;
  top: 0;
  left: 0; /* moved to left side */
  background: #d9534f;
  color: white;
  border: none;
  padding: 4px 8px;
  border-radius: 5px;
  cursor: pointer;
  display: none; /* hidden until toggle */
}
.compare-btn:hover {
  background: #b52b27;
}

/* TOGGLE COMPARE BUTTON */
.toggle-compare-btn {
  position: absolute;
  top: 30px; /* below top */
  left: 0;
  background: #5bc0de;
  color: white;
  border: none;
  padding: 3px 6px;
  border-radius: 4px;
  cursor: pointer;
  font-size: 12px;
}
.toggle-compare-btn:hover {
  background: #31b0d5;
}

/* TEXT BLOCK */
.text-block {
  background: #fafafa;
  padding: 8px;
  border-left: 4px solid #2d6cdf;
  border-radius: 6px;
  max-height: 180px;
  overflow-y: auto;
  font-size: 14px;
  margin-bottom: 3px;
}

/* TRANSLATION TOGGLE LINK */
.translation-header {
  font-weight: bold;
  cursor: pointer;
  color: #2d6cdf;
  margin-top: 3px;
  display: inline-block;
}

/* COMPARE PANEL */
.compare-panel {
  display: none;
  background: #eef2ff;
  padding: 10px;
  border-radius: 10px;
  margin-top: 15px;
}

.compare-grid {
  display: flex;
  flex-direction: column;
  gap: 5px;
}

.compare-box {
  background: white;
  padding: 8px;
  border-left: 4px solid #888;
  border-radius: 6px;
  max-height: 120px;
  overflow-y: auto;
}

/* DIFF */
.diff {
  background: yellow;
}

/* RESPONSIVE */
@media (max-width: 900px) {
  .page {
    max-width: 100%;
    padding: 10px;
  }
  .transcription-block {
    padding-left: 40px;
  }
}
</style>
</head>

<body>

<div class="page">
  <div class="text-area" id="textArea"></div>
  <div class="compare-panel" id="comparePanel"></div>
</div>

<script>
/* GENERATE DIVISIONS */
const textArea = document.getElementById("textArea");

for (let i = 1; i <= 92; i++) {

  const div = document.createElement("div");

  div.innerHTML = `
  <div class="division-title">Division ${i}</div>

  <div class="transcription-block">
    <button class="toggle-compare-btn" onclick="toggleCompareButton(this)">Show Compare</button>
    <button class="compare-btn" onclick="openCompare(${i})">Compare</button>

    <div class="text-block">
      <strong>Transcription</strong>
      <p>Transcription text for division ${i}...</p>
    </div>

    <div class="translation-header" onclick="toggleTranslation(this)">
      Translation
    </div>
    <div class="translation-content" style="display:none;">
      <p>Translation text for division ${i}...</p>
    </div>
  </div>
  `;

  textArea.appendChild(div);
}

/* TOGGLE TRANSLATION */
function toggleTranslation(el) {
  const content = el.nextElementSibling;
  content.style.display = content.style.display === "block" ? "none" : "block";
}

/* TOGGLE COMPARE BUTTON */
function toggleCompareButton(el) {
  const compareBtn = el.nextElementSibling;
  if (compareBtn.style.display === "none") {
    compareBtn.style.display = "inline-block";
    el.innerText = "Hide Compare";
  } else {
    compareBtn.style.display = "none";
    el.innerText = "Show Compare";
  }
}

/* OPEN COMPARE */
function openCompare(index) {
  const panel = document.getElementById("comparePanel");
  panel.style.display = "block";
  panel.innerHTML = `
    <h3>Comparison – Division ${index}</h3>
    <div class="compare-grid">
      <div class="compare-box sync"><strong>M1</strong><p>Version A text for division ${index}</p></div>
      <div class="compare-box sync"><strong>M2</strong><p>Version B text for division ${index}</p></div>
      <div class="compare-box sync"><strong>M3</strong><p>Version C text for division ${index}</p></div>
      <div class="compare-box sync"><strong>Ed.</strong><p>Edited version for division ${index}</p></div>
    </div>
  `;
  syncScroll();
  highlightDifferences();
}

/* SYNC SCROLL */
function syncScroll() {
  const boxes = document.querySelectorAll(".sync");
  boxes.forEach(box => {
    box.addEventListener("scroll", () => {
      boxes.forEach(other => {
        if (other !== box) other.scrollTop = box.scrollTop;
      });
    });
  });
}

/* DIFF */
function highlightDifferences() {
  const texts = Array.from(document.querySelectorAll(".compare-box p"));
  if (texts.length < 2) return;
  const base = texts[0].innerText.split(" ");
  texts.forEach(p => {
    const words = p.innerText.split(" ");
    let result = [];
    words.forEach((word, i) => {
      if (word !== base[i]) result.push(`<span class="diff">${word}</span>`);
      else result.push(word);
    });
    p.innerHTML = result.join(" ");
  });
}
</script>

</body>
</html>
