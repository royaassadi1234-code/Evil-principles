<script>
let currentCompareIndex = null;

/* TOGGLE TRANSLATION */
function toggleTranslation(el) {
  const content = el.nextElementSibling;
  content.style.display =
    content.style.display === "block" ? "none" : "block";
}

/* TOGGLE COMPARE PANEL */
function openCompare(index) {
  const panel = document.getElementById("comparePanel");

  // If the same division is clicked, collapse it
  if (currentCompareIndex === index) {
    panel.style.display = "none";
    currentCompareIndex = null;
    return;
  }

  // Otherwise, open and populate
  currentCompareIndex = index;
  panel.style.display = "block";

  panel.innerHTML = `
    <h3>Comparison – Division ${index}</h3>
    <div class="compare-grid">

      <div class="compare-box sync">
        <strong>M1</strong>
        <p>Version A text for division ${index}</p>
      </div>

      <div class="compare-box sync">
        <strong>M2</strong>
        <p>Version B text for division ${index}</p>
      </div>

      <div class="compare-box sync">
        <strong>M3</strong>
        <p>Version C text for division ${index}</p>
      </div>

      <div class="compare-box sync">
        <strong>Ed.</strong>
        <p>Edited version for division ${index}</p>
      </div>

    </div>
  `;

  syncScroll();
  highlightDifferences();
}

/* SYNC SCROLL */
function syncScroll() {
  const boxes = document.querySelectorAll(".sync");

  boxes.forEach(box => {
    box.addEventListener("scroll", () => {
      boxes.forEach(other => {
        if (other !== box) {
          other.scrollTop = box.scrollTop;
        }
      });
    });
  });
}

/* DIFF */
function highlightDifferences() {
  const texts = Array.from(document.querySelectorAll(".compare-box p"));

  if (texts.length < 2) return;

  const base = texts[0].innerText.split(" ");

  texts.forEach(p => {
    const words = p.innerText.split(" ");
    let result = [];

    words.forEach((word, i) => {
      if (word !== base[i]) {
        result.push(`<span class="diff">${word}</span>`);
      } else {
        result.push(word);
      }
    });

    p.innerHTML = result.join(" ");
  });
}
</script>
