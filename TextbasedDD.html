<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Digital Critical Edition</title>

<style>
body {
  font-family: Georgia, serif;
  background: #f8f9fb;
  margin: 0;
}

/* PAGE GRID */
/* PAGE GRID */
.page {
  display: grid;
  grid-template-columns: 2fr 1fr;
  gap: 10px; /* tighter */
  max-width: 1200px;
  margin: auto;
  padding: 15px 10px; /* reduced padding */
}

/* LEFT SIDE (MAIN TEXT AREA) */
.text-area {
  display: flex;
  flex-direction: column;
  gap: 5px; /* very tight */
}

/* CARD */
.card {
  background: white;
  padding: 10px; /* tighter */
  border-radius: 10px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.08); /* slightly lighter shadow */
}

/* DIVISION TITLE */
.division-title {
  font-size: 16px; /* slightly smaller */
  font-weight: bold;
  margin-bottom: 3px; /* very tight */
}

/* TRANSCRIPTION BLOCK */
.transcription-block {
  position: relative;
  margin-bottom: 5px; /* tight */
}

/* COMPARE BUTTON */
.compare-btn {
  top: 0;
  right: 0;
  padding: 3px 6px; /* smaller button */
  font-size: 12px; /* smaller text */
}

/* TEXT BLOCKS */
.text-block {
  background: #fafafa;
  padding: 8px; /* tight */
  border-left: 3px solid #2d6cdf; /* slightly thinner */
  border-radius: 4px;
  max-height: 180px;
  overflow-y: auto;
  font-size: 14px; /* slightly smaller text */
}

/* TRANSLATION HEADER */
.translation-header {
  font-weight: bold;
  cursor: pointer;
  color: #2d6cdf;
  margin-bottom: 3px; /* tighter */
}

/* COMPARE PANEL */
.compare-panel {
  display: none;
  background: #eef2ff;
  padding: 8px; /* tighter */
  border-radius: 8px;
}

.compare-grid {
  display: flex;
  flex-direction: column;
  gap: 3px; /* tight */
}

.compare-box {
  background: white;
  padding: 6px; /* tighter */
  border-left: 3px solid #888;
  border-radius: 4px;
  max-height: 100px;
  overflow-y: auto;
  font-size: 13px; /* smaller text */
}

/* DIFF */
.diff {
  background: yellow;
}

/* RESPONSIVE */
@media (max-width: 900px) {
  .page {
    grid-template-columns: 1fr;
  }
}
function toggleCompareButton(el) {
  const compareBtn = el.nextElementSibling;
  if (compareBtn.style.display === "none") {
    compareBtn.style.display = "inline-block";
    el.innerText = "Hide Compare";
  } else {
    compareBtn.style.display = "none";
    el.innerText = "Show Compare";
  }
}
/* TOGGLE COMPARE BUTTON */
.toggle-compare-btn {
  background: #5bc0de;
  color: white;
  border: none;
  padding: 3px 6px;
  border-radius: 4px;
  cursor: pointer;
  font-size: 12px;
  margin-right: 5px;
}

.toggle-compare-btn:hover {
  background: #31b0d5;
}

/* Compare button stays smaller */
.compare-btn {
  padding: 3px 6px;
  font-size: 12px;
}
</style>
</head>

<body>

<div class="page">

  <!-- LEFT SIDE -->
  <div class="text-area" id="textArea"></div>

  <!-- RIGHT SIDE -->
  <div class="compare-area">
    <div class="compare-panel" id="comparePanel"></div>
  </div>

</div>

<script>

/* GENERATE 92 DIVISIONS */
const textArea = document.getElementById("textArea");

for (let i = 1; i <= 92; i++) {

  const card = document.createElement("div");
  card.className = "card";

  card.innerHTML = `
  <div class="division-title">Division ${i}</div>

  <div class="transcription-block">
    <button class="toggle-compare-btn" onclick="toggleCompareButton(this)">
      Show Compare
    </button>

    <button class="compare-btn" onclick="openCompare(${i})" style="display:none;">
      Compare
    </button>

    <div class="text-block">
      <strong>Transcription</strong>
      <p>Transcription text for division ${i}...</p>
    </div>
  </div>

  <div class="text-block">
    <div class="translation-header" onclick="toggleTranslation(this)">
      Translation
    </div>
    <div class="translation-content" style="display:none;">
      <p>Translation text for division ${i}...</p>
    </div>
  </div>
`;

  textArea.appendChild(card);
}

/* TRANSLATION TOGGLE */
function toggleTranslation(el) {
  const content = el.nextElementSibling;
  content.style.display =
    content.style.display === "block" ? "none" : "block";
}

/* OPEN COMPARE PANEL */
function openCompare(index) {

  const panel = document.getElementById("comparePanel");

  panel.style.display = "block";

  panel.innerHTML = `
    <h3>Comparison – Division ${index}</h3>

    <div class="compare-grid">

      <div class="compare-box sync">
        <strong>M1</strong>
        <p>Version A text for division ${index}</p>
      </div>

      <div class="compare-box sync">
        <strong>M2</strong>
        <p>Version B text for division ${index}</p>
      </div>

      <div class="compare-box sync">
        <strong>M3</strong>
        <p>Version C text for division ${index}</p>
      </div>

      <div class="compare-box sync">
        <strong>Ed.</strong>
        <p>Edited version for division ${index}</p>
      </div>

    </div>
  `;

  syncScroll();
  highlightDifferences();
}

/* SYNC SCROLL */
function syncScroll() {
  const boxes = document.querySelectorAll(".sync");

  boxes.forEach(box => {
    box.addEventListener("scroll", () => {
      boxes.forEach(other => {
        if (other !== box) {
          other.scrollTop = box.scrollTop;
        }
      });
    });
  });
}

/* DIFF */
function highlightDifferences() {
  const texts = Array.from(document.querySelectorAll(".compare-box p"));

  if (texts.length < 2) return;

  const base = texts[0].innerText.split(" ");

  texts.forEach(p => {
    const words = p.innerText.split(" ");
    let result = [];

    words.forEach((word, i) => {
      if (word !== base[i]) {
        result.push(`<span class="diff">${word}</span>`);
      } else {
        result.push(word);
      }
    });

    p.innerHTML = result.join(" ");
  });
}

</script>

</body>
</html>
