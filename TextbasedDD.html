<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Digital Critical Edition</title>

<style>
body {
  font-family: Georgia, serif;
  background: #f8f9fb;
  margin: 0;
  padding: 0;
}

/* PAGE LAYOUT */
.page {
  display: grid;
  grid-template-columns: 2fr 1fr;
  gap: 15px; /* reduced from 25px */
  max-width: 1200px;
  margin: auto;
  padding: 20px 15px; /* reduced from 30px 20px */
}

/* LEFT SIDE */
.text-area {
  display: flex;
  flex-direction: column;
  gap: 10px; /* reduced from 20px */
}
/* DIVISION TITLE */
.division-title {
  font-size: 18px;
  font-weight: bold;
  margin-bottom: 5px; /* reduced from 10px */
}

/* TRANSCRIPTION BLOCK */
.transcription-block {
  position: relative;
  margin-bottom: 10px; /* reduced from 15px */
}

/* COMPARE BUTTON */
.compare-btn {
  position: absolute;
  top: 0;
  right: 0;
  background: #d9534f;
  color: white;
  border: none;
  padding: 5px 10px;
  border-radius: 5px;
  cursor: pointer;
}

.compare-btn:hover {
  background: #b52b27;
}

/* TEXT BLOCK */
.text-block {
  background: #fafafa;
  padding: 10px; /* reduced from 15px */
  border-left: 4px solid #2d6cdf;
  border-radius: 6px;
  max-height: 200px;
  overflow-y: auto;
}

/* TRANSLATION */
.translation-header {
  font-weight: bold;
  cursor: pointer;
  color: #2d6cdf;
  margin-bottom: 5px; /* reduced from 8px */
}
/* RIGHT SIDE */
.compare-area {
  position: sticky;
  top: 20px;
  height: fit-content;
}

/* COMPARE PANEL */
.compare-panel {
  display: none;
  background: #eef2ff;
  padding: 10px; /* reduced from 15px */
  border-radius: 10px;
}

.compare-grid {
  display: flex;
  flex-direction: column;
  gap: 5px; /* reduced from 10px */
}

.compare-box {
  background: white;
  padding: 8px; /* reduced from 10px */
  border-left: 4px solid #888;
  border-radius: 6px;
  max-height: 120px;
  overflow-y: auto;

/* DIFF */
.diff {
  background: yellow;
}

/* RESPONSIVE */
@media (max-width: 900px) {
  .page {
    grid-template-columns: 1fr;
  }
}
</style>
</head>

<body>

<div class="page">

  <!-- LEFT -->
  <div class="text-area" id="textArea"></div>

  <!-- RIGHT -->
  <div class="compare-area">
    <div class="compare-panel" id="comparePanel"></div>
  </div>

</div>

<script>

/* GENERATE DIVISIONS */
const textArea = document.getElementById("textArea");

for (let i = 1; i <= 92; i++) {

  const div = document.createElement("div");

card.innerHTML = `
  <div class="division-title">Division ${i}</div>

  <div class="transcription-block">
    <button class="toggle-compare-btn" onclick="toggleCompareButton(this)">
      Show Compare
    </button>

    <button class="compare-btn" onclick="openCompare(${i})" style="display:none;">
      Compare
    </button>

    <div class="text-block">
      <strong>Transcription</strong>
      <p>Transcription text for division ${i}...</p>
    </div>
  </div>

  <div class="text-block">
    <div class="translation-header" onclick="toggleTranslation(this)">
      Translation
    </div>
    <div class="translation-content" style="display:none;">
      <p>Translation text for division ${i}...</p>
    </div>
  </div>
`;

  textArea.appendChild(div);
}

/* TOGGLE TRANSLATION */
function toggleTranslation(el) {
  const content = el.nextElementSibling;
  content.style.display =
    content.style.display === "block" ? "none" : "block";
}

/* OPEN COMPARE */
function openCompare(index) {
  const panel = document.getElementById("comparePanel");
  panel.style.display = "block";

  panel.innerHTML = `
    <h3>Comparison – Division ${index}</h3>

    <div class="compare-grid">

      <div class="compare-box sync">
        <strong>M1</strong>
        <p>Version A text for division ${index}</p>
      </div>

      <div class="compare-box sync">
        <strong>M2</strong>
        <p>Version B text for division ${index}</p>
      </div>

      <div class="compare-box sync">
        <strong>M3</strong>
        <p>Version C text for division ${index}</p>
      </div>

      <div class="compare-box sync">
        <strong>Ed.</strong>
        <p>Edited version for division ${index}</p>
      </div>

    </div>
  `;

  syncScroll();
  highlightDifferences();
}

/* SYNC SCROLL */
function syncScroll() {
  const boxes = document.querySelectorAll(".sync");

  boxes.forEach(box => {
    box.addEventListener("scroll", () => {
      boxes.forEach(other => {
        if (other !== box) {
          other.scrollTop = box.scrollTop;
        }
      });
    });
  });
}

/* DIFF */
function highlightDifferences() {
  const texts = Array.from(document.querySelectorAll(".compare-box p"));

  if (texts.length < 2) return;

  const base = texts[0].innerText.split(" ");

  texts.forEach(p => {
    const words = p.innerText.split(" ");
    let result = [];

    words.forEach((word, i) => {
      if (word !== base[i]) {
        result.push(`<span class="diff">${word}</span>`);
      } else {
        result.push(word);
      }
    });

    p.innerHTML = result.join(" ");
  });
}
function toggleCompareButton(el) {
  const compareBtn = el.nextElementSibling;
  if (compareBtn.style.display === "none") {
    compareBtn.style.display = "inline-block";
    el.innerText = "Hide Compare";
  } else {
    compareBtn.style.display = "none";
    el.innerText = "Show Compare";
  }
}
</script>

</body>
</html>
