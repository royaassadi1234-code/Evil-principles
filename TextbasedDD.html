<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Digital Critical Edition</title>

<style>
body {
  font-family: Georgia, serif;
  background: #f8f9fb;
  margin: 0;
  padding: 0;
}

/* PAGE LAYOUT */
.page {
  display: flex;           /* horizontal layout */
  justify-content: flex-start; /* align left */
  gap: 20px;
  max-width: 1200px;
  margin: 0 auto;
  padding: 20px;
}

/* LEFT SIDE */
.text-area {
  flex: 0 0 700px;   /* fixed width for content on left */
  display: flex;
  flex-direction: column;
  gap: 20px;
}

/* DIVISION TITLE */
.division-title {
  font-weight: bold;
  font-size: 18px;
  margin-bottom: 10px;
}

/* TRANSCRIPTION BLOCK */
.transcription-block {
  position: relative;
  border-left: 3px solid #2d6cdf;
  padding-left: 10px;
}

/* TRANSCRIPTION HEADER */
.transcription-header {
  cursor: pointer;
  font-weight: bold;
  color: #2d6cdf;
  margin-bottom: 5px;
}

/* TEXT BLOCKS */
.text-block {
  padding: 5px 0;
  max-height: 200px;
  overflow-y: auto;
}

.transcription-content,
.translation-content {
  display: none;  /* start collapsed */
}

/* TRANSLATION HEADER */
.translation-header {
  cursor: pointer;
  color: #2d6cdf;
  font-weight: bold;
  margin-top: 10px;
}

/* COMPARE BUTTON */
.compare-btn {
  position: absolute;
  top: 0;
  right: -80px;  /* move outside transcription block */
  background: #d9534f;
  color: white;
  border: none;
  padding: 5px 10px;
  border-radius: 5px;
  cursor: pointer;
}

.compare-btn:hover {
  background: #b52b27;
}

/* RIGHT SIDE */
.compare-area {
  flex: 0 0 350px;
  position: sticky;
  top: 20px;
  height: fit-content;
}

/* COMPARE PANEL */
.compare-panel {
  display: none;
}

.compare-grid {
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.compare-box {
  border-left: 3px solid #888;
  padding-left: 10px;
  max-height: 120px;
  overflow-y: auto;
}

/* DIFF */
.diff {
  background: yellow;
}

/* RESPONSIVE */
@media (max-width: 1100px) {
  .page {
    flex-direction: column;
  }
  .compare-btn {
    right: 0;
    margin-top: 5px;
  }
}
</style>
</head>

<body>

<div class="page">

  <!-- LEFT -->
  <div class="text-area" id="textArea"></div>

  <!-- RIGHT -->
  <div class="compare-area">
    <div class="compare-panel" id="comparePanel"></div>
  </div>

</div>

<script>
// GLOBAL STATE
const textArea = document.getElementById("textArea");
const comparePanel = document.getElementById("comparePanel");
let currentCompareIndex = null;

// GENERATE DIVISIONS
for (let i = 1; i <= 92; i++) {
  const div = document.createElement("div");

  div.innerHTML = `
    <div class="division-title">Division ${i}</div>

    <div class="transcription-block">
      <div class="transcription-header" onclick="toggleTranscription(this)">
        Transcription ▶
      </div>
      <div class="transcription-content text-block">
        <p>Transcription text for division ${i}...</p>
      </div>
      <button class="compare-btn" onclick="toggleCompare(${i})">Compare</button>
    </div>

    <div class="text-block">
      <div class="translation-header" onclick="toggleTranslation(this)">
        Translation ▶
      </div>
      <div class="translation-content">
        <p>Translation text for division ${i}...</p>
      </div>
    </div>
  `;

  textArea.appendChild(div);
}

// TOGGLE TRANSCRIPTION
function toggleTranscription(el) {
  const content = el.nextElementSibling;
  if (content.style.display === "block") {
    content.style.display = "none";
    el.innerText = "Transcription ▶";
  } else {
    content.style.display = "block";
    el.innerText = "Transcription ▼";
  }
}

// TOGGLE TRANSLATION
function toggleTranslation(el) {
  const content = el.nextElementSibling;
  if (content.style.display === "block") {
    content.style.display = "none";
    el.innerText = "Translation ▶";
  } else {
    content.style.display = "block";
    el.innerText = "Translation ▼";
  }
}

// TOGGLE COMPARE PANEL
function toggleCompare(index) {
  if (currentCompareIndex === index) {
    comparePanel.style.display = "none";
    currentCompareIndex = null;
    return;
  }

  currentCompareIndex = index;
  comparePanel.style.display = "block";

  comparePanel.innerHTML = `
    <h3>Comparison – Division ${index}</h3>
    <div class="compare-grid">

      <div class="compare-box sync">
        <strong>M1</strong>
        <p>Version A text for division ${index}</p>
      </div>

      <div class="compare-box sync">
        <strong>M2</strong>
        <p>Version B text for division ${index}</p>
      </div>

      <div class="compare-box sync">
        <strong>M3</strong>
        <p>Version C text for division ${index}</p>
      </div>

      <div class="compare-box sync">
        <strong>Ed.</strong>
        <p>Edited version for division ${index}</p>
      </div>

    </div>
  `;

  syncScroll();
  highlightDifferences();
}

// SYNC SCROLL
function syncScroll() {
  const boxes = document.querySelectorAll(".sync");
  boxes.forEach(box => {
    box.onscroll = () => {
      boxes.forEach(other => {
        if (other !== box) {
          other.scrollTop = box.scrollTop;
        }
      });
    };
  });
}

// HIGHLIGHT DIFFERENCES
function highlightDifferences() {
  const texts = Array.from(document.querySelectorAll(".compare-box p"));

  if (texts.length < 2) return;

  const base = texts[0].innerText.split(" ");

  texts.forEach(p => {
    const words = p.innerText.split(" ");
    let result = [];

    words.forEach((word, i) => {
      if (word !== base[i]) {
        result.push(`<span class="diff">${word}</span>`);
      } else {
        result.push(word);
      }
    });

    p.innerHTML = result.join(" ");
  });
}
</script>

</body>
</html>
