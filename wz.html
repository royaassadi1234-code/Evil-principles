<style>
:root {
  --bg: #f4efe6;
  --bg-accent: #e7ddd1;

  --surface-strong: #fffdf9;

  --block-hover: #e3d2be;

}

* { box-sizing: border-box; }

body {
  margin: 0;
  min-height: 100vh;
  font-family: var(--serif-stack);
  color: var(--text);

.page {

  border-radius: 28px;
  background: linear-gradient(180deg, rgba(255, 253, 249, 0.96), rgba(247, 240, 231, 0.9));
  box-shadow: var(--shadow);

h1 {

  font-size: clamp(2.2rem, 5vw, 4rem);

.section-grid {

.grid-header,
.grid-row {
  display: grid;
  grid-template-columns: repeat(3, minmax(0, 1fr));
  gap: 24px;
}

.column-heading,
.column-cell {
  border: 1px solid var(--border);
  border-radius: 24px;
  background: var(--surface);
  box-shadow: var(--shadow);
}

.column-heading {
  padding: 22px;
}

.column-heading h2 {
  margin: 0;
  font-size: 1.45rem;
  line-height: 1.25;
}

.column-cell {
  padding: 18px;
  min-height: 96px;
}

.column-cell.is-empty {
  background: rgba(255, 251, 245, 0.55);
  border-style: dashed;
  box-shadow: none;
}

.empty-note {
  margin: 0;
  color: var(--muted);
  font-style: italic;
}

.block {
  padding: 14px 16px;
  background: var(--block-bg);
  cursor: pointer;
  border: 1px solid rgba(159, 63, 44, 0.1);
  border-radius: 16px;

  color: var(--text);

.block:hover {

.cards {

.content-grid {

.card-header {

  hyphens: auto;
  overflow-wrap: anywhere;
  word-break: break-word;

.transcription-block,
.translation-block,
.note-block {

  width: 100%;

.text-paragraph {
  margin: 0;
  text-align: justify;
  text-align-last: left;

.text-paragraph + .text-paragraph {

}

.text-division {

  margin-right: 0.35em;

.analysis-link:hover {

.analysis-link.is-empty {

  cursor: default;
  pointer-events: none;

.card-section + .card-section,

.content-card {

.card-link a:hover {

.red-highlight { color: #a12f1c; font-weight: bold; }

@media (max-width: 1000px) {

<script>
function toggleCards(id) {
  const selected = document.getElementById(id);
  const shouldOpen = selected.style.display !== 'flex';

  document.querySelectorAll('.cards').forEach(cardGroup => {
    cardGroup.style.display = 'none';
  });

  selected.style.display = shouldOpen ? 'flex' : 'none';
}

function escapeHtml(value) {
  return String(value)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;');
}

function formatTextBlock(value) {
  const text = String(value || '')
    .replace(/\r\n/g, '\n')
    .replace(/\n\s*((?:Vd\.|DD|WZ)\s+\d+\.\d+[a-z]?)/gi, '\n\n$1')
    .trim();
  if (!text) {
    return '';
  }

  return text
    .split(/\n\s*\n/)
    .map(paragraph => paragraph.replace(/\n+/g, ' ').trim())
    .filter(Boolean)
    .map(paragraph => {
      const match = paragraph.match(/^((?:Vd\.|DD|WZ)\s+\d+\.\d+[a-z]?)\s*(.*)$/i);
      if (!match) {
        return `<p class="text-paragraph">${escapeHtml(paragraph)}</p>`;
      }

      const division = escapeHtml(match[1]);
      const remainder = escapeHtml(match[2]);

      if (!remainder) {
        return `<p class="text-paragraph"><span class="text-division">${division}</span></p>`;
      }

      return `<p class="text-paragraph"><span class="text-division">${division}</span>${remainder}</p>`;
    })
    .join('');
}

function buildFurtherInfoLink(url) {
  if (!url) {
    return '';
  }

  const safeUrl = escapeHtml(url);
  return `
    <div class="card-link">
      <span class="card-link-title">More information</span>
      <a href="${safeUrl}" target="_blank" rel="noopener noreferrer">Open related card</a>
    </div>
  `;
}

function buildAnalysisLink(url) {
  if (!url) {
    return `<span class="analysis-link is-empty">See full analysis</span>`;
  }

  const safeUrl = escapeHtml(url);
  return `<a class="analysis-link" href="${safeUrl}" target="_blank" rel="noopener noreferrer">See full analysis</a>`;
}

function buildReferenceCard(title, content, link, emptyText, extraClass = '') {
  const body = content
    ? `<div class="note-block">${formatTextBlock(content)}</div>`
    : `<div class="note-block note-empty">${emptyText}</div>`;

  return `
    <section class="card card-section content-card ${extraClass}">
      <h3>${title}</h3>
      ${body}
      ${buildFurtherInfoLink(link)}
    </section>
  `;
}

function buildInlineLayout(item) {
  const wzContent = item.WZ
    ? item.WZ
    : '';
  const ceteriSource = item.Ceteri || item.other || item.comparison || '';
  const notesContent = item.Notes
    ? item.Notes
    : '';

  return `
    <div class="content-grid">
      <section class="card card-section content-card">
        <h3>Transcription</h3>
        <div class="field-block transcription-block">${formatTextBlock(item.transcription)}</div>
        ${buildAnalysisLink(item.analysisLink)}
      </section>
      <section class="card card-section content-card">
        <h3>Translation</h3>
        <div class="field-block translation-block">${formatTextBlock(item.translation)}</div>
      </section>
      ${buildReferenceCard('WZ', wzContent, item.WZLink, 'No WZ note yet.')}
      ${buildReferenceCard('Cet.', ceteriSource, item.CeteriLink, 'No Cet. note yet.')}
      ${buildReferenceCard('Notes', notesContent, item.NotesLink, 'No notes yet.', 'notes-card')}
    </div>
  `;
}

function createEntryMarkup(prefix, item, index) {
  if (!item) {
    return '<div class="column-cell is-empty"><p class="empty-note">No section in this row.</p></div>';
  }

  const cardId = `${prefix}${index}`;
  return `
    <div class="column-cell">
      <div class="block" onclick="toggleCards('${cardId}')">${escapeHtml(item.label)}</div>
      <div class="cards" id="${cardId}">
        ${buildInlineLayout(item)}
      </div>
    </div>
  `;
}

function renderSectionGrid(columns) {
  const root = document.getElementById('section-grid');
  const maxRows = Math.max(...columns.map(column => column.cards.length));

  let html = `
    <div class="grid-header">
      ${columns.map(column => `<section class="column-heading"><h2>${escapeHtml(column.title)}</h2></section>`).join('')}
    </div>
  `;

  for (let i = 0; i < maxRows; i += 1) {
    html += '<div class="grid-row">';
    columns.forEach(column => {
      html += createEntryMarkup(column.prefix, column.cards[i], i);
    });
    html += '</div>';
  }

  root.innerHTML = html;
}

function highlightWords() {
  const redWords = ['aŋhrōmaińiiuš', 'Ahrimen', 'angraman', 'gannāgmēnōy', 'ahreman', 'Gannāg Mēnōy', 'Ganāy Mēnōy', 'Ahrimenīg'];
  const greenWords = ['Druj'];

  document.querySelectorAll('.card').forEach(card => {
    let html = card.innerHTML;
    redWords.forEach(word => {
      const regex = new RegExp('\\b(' + word + ')\\b', 'gi');
      html = html.replace(regex, '<span class="red-highlight">$1</span>');
    });
    greenWords.forEach(word => {
      const regex = new RegExp('\\b(' + word + ')\\b', 'g');
      html = html.replace(regex, '<span class="green-highlight">$1</span>');
    });
    card.innerHTML = html;
  });
}

window.onload = () => {
  renderSectionGrid([
    { title: 'Ahreman', prefix: 'AhM', cards: AhMCards },
    { title: 'Drūz', prefix: 'Dz', cards: DzCards },
    { title: 'Hybrid', prefix: 'Hyb', cards: HybCards }
  ]);
  highlightWords();
};
</script>
