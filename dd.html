<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Dādestān ī dēnīg</title>

<style>
body {
  font-family: Arial, sans-serif;
  margin: 0;
  padding: 20px;
}

/* Three columns layout */
.container {
  display: grid;
  grid-template-columns: repeat(3, 1fr); /* 4 equal columns */
  gap: 20px;
  width: 100%;
}

/* Each column */
.column {
  display: flex;
  flex-direction: column;
  gap: 10px;
}

/* Vertical blocks */
.block {
  padding: 12px;
  background-color: #ddd;
  cursor: pointer;
  border-radius: 5px;
  text-align: center;
  font-weight: bold;
}

.block:hover {
  background-color: #bbb;
}

/* Cards displayed vertically */
.cards {
  display: none;
  flex-direction: column;
  gap: 10px;
  margin-top: 5px;
}

/* Individual card */
.card {
  background-color: #f9f9f9;
  padding: 12px;
  border-radius: 8px;
  border: 1px solid #ccc;
  line-height: 1.5;
}

/* Highlight words */
.red-highlight {
  color: red;
  font-weight: bold;
}

.green-highlight {
  color: green;
  font-weight: bold;
}

/* Responsive for small screens */
@media (max-width: 900px) {
  .container {
    flex-direction: column;
  }
}
</style>

<script>
// Toggle cards and auto-hide others
function toggleCards(id) {
  // Hide all cards
  document.querySelectorAll('.cards').forEach(c => {
    if(c.id !== id) c.style.display = 'none';
  });

  // Toggle selected
  const el = document.getElementById(id);
  el.style.display = (el.style.display === 'flex') ? 'none' : 'flex';
}

// Highlight words automatically
function highlightWords() {
  const redWords = ['aŋhrōmaińiiuš', 'Ahrimen', 'angraman'];
  const greenWords = ['Druj'];

  document.querySelectorAll('.card').forEach(card => {
    let html = card.innerHTML;
    redWords.forEach(word => {
      const regex = new RegExp(`\\b(${word})\\b`, 'g');
      html = html.replace(regex, '<span class="red-highlight">$1</span>');
    });
    greenWords.forEach(word => {
      const regex = new RegExp(`\\b(${word})\\b`, 'g');
      html = html.replace(regex, '<span class="green-highlight">$1</span>');
    });
    card.innerHTML = html;
  });
}

window.onload = highlightWords;
</script>

</head>
<body>

<h1>Vīdēvdād</h1>
<p>Click a block to show transcription, translation, and comparison. Only one block's cards are visible at a time.</p>
<div class="container">

  <!-- Column 1: Ahreman -->
  <div class="column">
    <h2>Ahreman</h2>
    <!-- 10 blocks -->
    <script>
      for(let i=1;i<=10;i++){
        document.write('<div class="block" onclick="toggleCards(\'ah'+i+'\')">'+i+'</div>');
        document.write('<div class="cards" id="ah'+i+'">');
        document.write('<div class="card"><h3>Transcription</h3><p>Ahrimen and aŋhrōmaińiiuš appear in block '+i+'.</p></div>');
        document.write('<div class="card"><h3>Translation</h3><p>Translation Druj appears in block '+i+'.</p></div>');
        document.write('<div class="card"><h3>Comparison</h3><p>Comparison angraman mentioned in block '+i+'.</p></div>');
        document.write('</div>');
      }
    </script>
  </div>

  <!-- Column 2: Druj -->
  <div class="column">
    <h2>Druj</h2>
    <script>
      for(let i=1;i<=10;i++){
        document.write('<div class="block" onclick="toggleCards(\'dr'+i+'\')">'+i+'</div>');
        document.write('<div class="cards" id="dr'+i+'">');
        document.write('<div class="card"><h3>Transcription</h3><p>Druj appears with Ahrimen and aŋhrōmaińiiuš in block '+i+'.</p></div>');
        document.write('<div class="card"><h3>Translation</h3><p>Translation includes Druj in block '+i+'.</p></div>');
        document.write('<div class="card"><h3>Comparison</h3><p>Comparison angraman in block '+i+'.</p></div>');
        document.write('</div>');
      }
    </script>
  </div>

  <!-- Column 3: Polyseme -->
  <div class="column">
    <h2>Polyseme</h2>
    <script>
      for(let i=1;i<=10;i++){
        document.write('<div class="block" onclick="toggleCards(\'pl'+i+'\')">'+i+'</div>');
        document.write('<div class="cards" id="pl'+i+'">');
        document.write('<div class="card"><h3>Transcription</h3><p>Polyseme text with Ahrimen and aŋhrōmaińiiuš in block '+i+'.</p></div>');
        document.write('<div class="card"><h3>Translation</h3><p>Translation Druj appears in block '+i+'.</p></div>');
        document.write('<div class="card"><h3>Comparison</h3><p>Comparison angraman in block '+i+'.</p></div>');
        document.write('</div>');
      }
    </script>
  </div>

</div>

</body>
</html>
